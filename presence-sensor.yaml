esphome:
  name: office

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Office Fallback Hotspot"
    password: !secret fallback_password

captive_portal:

web_server:

# LD2410C presence sensor (UART on safe GPIO pins)
uart:
  - id: uart_bus
    tx_pin: GPIO18
    rx_pin: GPIO19
    baud_rate: 256000
    parity: NONE
    stop_bits: 1

ld2410:
  uart_id: uart_bus

# Runtime configuration entities for HA
switch:
  - platform: ld2410
    engineering_mode:
      name: "Engineering mode"

button:
  - platform: ld2410
    factory_reset:
      name: "Factory reset"

binary_sensor:
  - platform: ld2410
    has_target:
      name: "Presence detected"
    has_moving_target:
      name: "Moving target"
    has_still_target:
      name: "Still target"

sensor:
  - platform: ld2410
    moving_distance:
      name: "Moving distance"
    still_distance:
      name: "Still distance"
    moving_energy:
      name: "Moving energy"
    still_energy:
      name: "Still energy"
    detection_distance:
      name: "Detection distance"
    