esphome:
  name: office

esp32:
  board: esp32dev
  framework:
    type: esp-idf   # recommended for bluetooth_proxy (better BLE memory/stability)

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Office Fallback Hotspot"
    password: !secret fallback_password

captive_portal:

# --- Bluetooth proxy ---------------------------------------------------------
# Active scanning + active connections so the standalone BLE LD2410
# ("Mini Motion", ld2410_ble integration) can connect through this in-room ESP32.
esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true
# -----------------------------------------------------------------------------

# LD2410C presence sensor (UART on safe GPIO pins)
uart:
  - id: uart_bus
    tx_pin: GPIO18
    rx_pin: GPIO19
    baud_rate: 256000
    parity: NONE
    stop_bits: 1

ld2410:
  uart_id: uart_bus

# Runtime configuration entities for HA
switch:
  - platform: ld2410
    engineering_mode:
      name: "Engineering mode"

button:
  - platform: ld2410
    factory_reset:
      name: "Factory reset"
    query_params:
      name: "Query params"

binary_sensor:
  - platform: ld2410
    has_target:
      name: "Presence detected"
    has_moving_target:
      name: "Moving target"
    has_still_target:
      name: "Still target"

sensor:
  - platform: ld2410
    moving_distance:
      name: "Moving distance"
    still_distance:
      name: "Still distance"
    moving_energy:
      name: "Moving energy"
    still_energy:
      name: "Still energy"
    detection_distance:
      name: "Detection distance"
    # Per-gate energies (engineering mode must be on to see live values)
    g0:
      move_energy:
        name: "G0 move energy"
      still_energy:
        name: "G0 still energy"
    g1:
      move_energy:
        name: "G1 move energy"
      still_energy:
        name: "G1 still energy"
    g2:
      move_energy:
        name: "G2 move energy"
      still_energy:
        name: "G2 still energy"
    g3:
      move_energy:
        name: "G3 move energy"
      still_energy:
        name: "G3 still energy"
    g4:
      move_energy:
        name: "G4 move energy"
      still_energy:
        name: "G4 still energy"
    g5:
      move_energy:
        name: "G5 move energy"
      still_energy:
        name: "G5 still energy"
    g6:
      move_energy:
        name: "G6 move energy"
      still_energy:
        name: "G6 still energy"
    g7:
      move_energy:
        name: "G7 move energy"
      still_energy:
        name: "G7 still energy"
    g8:
      move_energy:
        name: "G8 move energy"
      still_energy:
        name: "G8 still energy"

number:
  - platform: ld2410
    # Detection range: 0–8 gates, each gate ≈ 0.75m
    max_move_distance_gate:
      name: "Max move distance gate"
    max_still_distance_gate:
      name: "Max still distance gate"
    # Seconds of no presence before sensor clears (reduces false "still" detections)
    timeout:
      name: "Absence timeout"

  - platform: ld2410
    # Per-gate sensitivity thresholds (0–100; lower = more sensitive)
    g0:
      move_threshold:
        name: "G0 move threshold"
      still_threshold:
        name: "G0 still threshold"
    g1:
      move_threshold:
        name: "G1 move threshold"
      still_threshold:
        name: "G1 still threshold"
    g2:
      move_threshold:
        name: "G2 move threshold"
      still_threshold:
        name: "G2 still threshold"
    g3:
      move_threshold:
        name: "G3 move threshold"
      still_threshold:
        name: "G3 still threshold"
    g4:
      move_threshold:
        name: "G4 move threshold"
      still_threshold:
        name: "G4 still threshold"
    g5:
      move_threshold:
        name: "G5 move threshold"
      still_threshold:
        name: "G5 still threshold"
    g6:
      move_threshold:
        name: "G6 move threshold"
      still_threshold:
        name: "G6 still threshold"
    g7:
      move_threshold:
        name: "G7 move threshold"
      still_threshold:
        name: "G7 still threshold"
    g8:
      move_threshold:
        name: "G8 move threshold"
      still_threshold:
        name: "G8 still threshold"

select:
  - platform: ld2410
    distance_resolution:
      name: "Distance resolution"
    